services:
  fiver-ceaser:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SESSION_NAME: ${SESSION_NAME:-fiver-ceaser}
      TARGET_GROUP_ID: ${TARGET_GROUP_ID:-}
      TARGET_GROUP_NAME: ${TARGET_GROUP_NAME:-}
      DRY_RUN: ${DRY_RUN:-false}
      PORT: ${PORT:-3000}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      IGNORED_PARTICIPANT_IDS: ${IGNORED_PARTICIPANT_IDS:-58090154115181@lid}
    expose:
      - "3000"
    volumes:
      - fiver_ceaser_auth_v2:/app/.wwebjs_auth
      - fiver_ceaser_cache_v2:/app/.wwebjs_cache

volumes:
  fiver_ceaser_auth_v2:
  fiver_ceaser_cache_v2:
